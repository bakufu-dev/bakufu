name: 機能要望
description: 新機能の提案や改善要望
title: "feat: [機能の概要を簡潔に記述]"
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 解決したい課題
      description: どんな問題・不便さを解決したいですか？
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 提案する解決策
      description: どのような機能・変更があれば課題が解決されますか？
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: 影響範囲
      options:
        - ドメインモデル（Empire / Room / Workflow / Agent / Task / ExternalReviewGate）
        - バックエンド API（FastAPI）
        - フロントエンド UI（React）
        - dev-workflow（lefthook / justfile / CI）
        - ドキュメント
        - 全体・横断
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案
      description: 他にどのような解決策を検討しましたか？（任意）

  - type: textarea
    id: additional_context
    attributes:
      label: 補足情報
      description: 関連 Issue / 参考実装 / スクリーンショット等（任意）
