name: Test Backend

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-backend:
    name: test-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup tools (no lefthook install)
        run: bash scripts/setup.sh --tools-only

      - name: just test-backend
        run: just test-backend
