; Alembic configuration for the bakufu Backend.
;
; The on-disk URL is patched at runtime by ``alembic/env.py`` based on
; the resolved ``BAKUFU_DATA_DIR``. The placeholder below is only used
; when running ``alembic`` standalone (e.g. ``just migrate``).

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = %(here)s/src
path_separator = os
sqlalchemy.url = sqlite+aiosqlite:///./bakufu.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
